<!DOCTYPE html>
<html lang="${LANG}" class="dark">

<head>
    <meta charset="UTF-8">
    <title>QBT_TR(New Category)QBT_TR[CONTEXT=TransferListWidget]</title>
    <link rel="stylesheet" href="css/style.css?v=${CACHEID}" type="text/css">
    <script src="scripts/lib/MooTools-Core-1.6.0-compat-compressed.js"></script>
    <script src="scripts/lib/MooTools-More-1.6.0-compat-compressed.js"></script>
    <script src="scripts/localpreferences.js?v=${CACHEID}"></script>
    <script src="scripts/color-scheme.js?v=${CACHEID}"></script>
    <script src="scripts/misc.js?locale=${LANG}&v=${CACHEID}"></script>
    <script src="scripts/pathAutofill.js?v=${CACHEID}"></script>
    <script>
        "use strict";

        window.addEventListener("DOMContentLoaded", () => {
            window.addEventListener("keydown", (event) => {
                switch (event.key) {
                    case "Enter":
                        event.preventDefault();
                        $("categoryNameButton").click();
                        break;
                    case "Escape":
                        event.preventDefault();
                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                        break;
                }
            });

            const searchParams = new URLSearchParams(window.location.search);
            const uriAction = window.qBittorrent.Misc.safeTrim(searchParams.get("action"));
            const uriHashes = window.qBittorrent.Misc.safeTrim(searchParams.get("hashes"));
            const uriCategoryName = window.qBittorrent.Misc.safeTrim(searchParams.get("categoryName"));
            const uriSavePath = window.qBittorrent.Misc.safeTrim(searchParams.get("savePath"));
            const showError = (message, field = null) => {
                $("categoryError").textContent = message;
                field?.focus();
            };
            const mediaRootSegments = new Set(["anime", "audiobooks", "book", "books", "media", "movie", "movies", "music", "series", "show", "shows", "television", "tv"]);
            const pathLooksLikeMediaLibraryRoot = (path) => {
                const normalizedPath = path.trim().replaceAll("\\", "/").toLowerCase();
                if (!normalizedPath)
                    return false;

                const isAbsolute = normalizedPath.startsWith("/")
                    || normalizedPath.startsWith("//")
                    || /^[a-z]:\//.test(normalizedPath);
                return isAbsolute && normalizedPath.split("/").some((segment) => mediaRootSegments.has(segment));
            };
            const updateCategoryPathHint = () => {
                $("categoryPathHint").hidden = !pathLooksLikeMediaLibraryRoot($("savePath").value);
            };

            if (uriAction === "edit") {
                if (!uriCategoryName)
                    return;

                $("categoryName").disabled = true;
                $("categoryName").value = uriCategoryName;
                $("savePath").value = uriSavePath;
                $("savePath").focus();
            }
            else if (uriAction === "createSubcategory") {
                $("categoryName").value = uriCategoryName;
                $("categoryName").focus();
            }
            else {
                $("categoryName").focus();
            }

            $("savePath").addEventListener("input", updateCategoryPathHint);
            updateCategoryPathHint();

            $("categoryNameButton").addEventListener("click", (e) => {
                e.preventDefault();
                e.stopPropagation();

                const savePath = $("savePath").value.trim();
                const categoryName = $("categoryName").value.trim();

                const verifyCategoryName = (name) => {
                    $("categoryError").textContent = "";

                    if ((name === null) || (name === "")) {
                        showError("QBT_TR(Name cannot be empty)QBT_TR[CONTEXT=HttpServer]", $("categoryName"));
                        return false;
                    }
                    if (name.match("^([^\\\\\\/]|[^\\\\\\/]([^\\\\\\/]|\\/(?=[^\\/]))*[^\\\\\\/])$") === null) {
                        showError("QBT_TR(Invalid category name:\nPlease do not use any special characters in the category name.)QBT_TR[CONTEXT=HttpServer]", $("categoryName"));
                        return false;
                    }
                    return true;
                };

                switch (uriAction) {
                    case "set":
                        if ((uriHashes === "") || !verifyCategoryName(categoryName))
                            return;

                        fetch("api/v2/torrents/createCategory", {
                                method: "POST",
                                body: new URLSearchParams({
                                    category: categoryName,
                                    savePath: savePath
                                })
                            })
                            .then((response) => {
                                if (!response.ok) {
                                    showError(`QBT_TR(Unable to create category)QBT_TR[CONTEXT=Category] ${window.qBittorrent.Misc.escapeHtml(categoryName)}`);
                                    return;
                                }

                                fetch("api/v2/torrents/setCategory", {
                                        method: "POST",
                                        body: new URLSearchParams({
                                            hashes: uriHashes,
                                            category: categoryName
                                        })
                                    })
                                    .then((response) => {
                                        if (!response.ok) {
                                            showError("QBT_TR(Unable to set category)QBT_TR[CONTEXT=Category]");
                                            return;
                                        }

                                        window.parent.updateMainData();
                                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                                    });
                            });
                        break;

                    case "create":
                    case "createSubcategory":
                        if (!verifyCategoryName(categoryName))
                            return;
                        fetch("api/v2/torrents/createCategory", {
                                method: "POST",
                                body: new URLSearchParams({
                                    category: categoryName,
                                    savePath: savePath
                                })
                            })
                            .then((response) => {
                                if (!response.ok) {
                                    showError("QBT_TR(Unable to create category)QBT_TR[CONTEXT=Category]");
                                    return;
                                }

                                window.parent.updateMainData();
                                window.parent.qBittorrent.Client.closeFrameWindow(window);
                            });
                        break;

                    case "edit":
                        fetch("api/v2/torrents/editCategory", {
                                method: "POST",
                                body: new URLSearchParams({
                                    category: uriCategoryName, // category name can't be changed
                                    savePath: savePath
                                })
                            })
                            .then((response) => {
                                if (!response.ok) {
                                    showError("QBT_TR(Unable to edit category)QBT_TR[CONTEXT=Category]");
                                    return;
                                }

                                window.parent.updateMainData();
                                window.parent.qBittorrent.Client.closeFrameWindow(window);
                            });
                        break;
                }
            });

            window.qBittorrent.pathAutofill.attachPathAutofill();
        });
    </script>
</head>

<body>
    <div class="mobileDialogForm" style="padding: 10px 10px 0px 10px;">
        <label for="categoryName" style="font-weight: bold;">QBT_TR(Category:)QBT_TR[CONTEXT=TransferListWidget]</label>
        <input type="text" id="categoryName" style="width: 99%;">
        <label for="savePath" style="font-weight: bold;">QBT_TR(Save path:)QBT_TR[CONTEXT=TransferListWidget]</label>
        <input type="text" id="savePath" class="pathDirectory" style="width: 99%;">
        <div id="categoryPathHint" class="mobileFormHint" role="note" hidden>QBT_TR(TRaSH Guides hint: use a subfolder-only category path such as "movies" or "tv", keep the default save path at the download root, and enable Automatic torrent management. Avoid pointing categories at the media library root.)QBT_TR[CONTEXT=Category]</div>
        <div id="categoryError" class="mobileFormError" role="alert" aria-live="polite"></div>
        <div class="mobileDialogActions" style="text-align: center; padding-top: 10px;">
            <input type="button" value="QBT_TR(OK)QBT_TR[CONTEXT=Category]" id="categoryNameButton">
        </div>
    </div>
</body>

</html>
