<!DOCTYPE html>
<html lang="${LANG}" class="dark">

<head>
    <meta charset="UTF-8">
    <title>QBT_TR(Torrent Options)QBT_TR[CONTEXT=PropertiesWidget]</title>
    <link rel="stylesheet" href="css/style.css?v=${CACHEID}" type="text/css">
    <script src="scripts/lib/MooTools-Core-1.6.0-compat-compressed.js"></script>
    <script src="scripts/lib/MooTools-More-1.6.0-compat-compressed.js"></script>
    <script src="scripts/lib/mocha.min.js"></script>
    <script src="scripts/localpreferences.js?v=${CACHEID}"></script>
    <script src="scripts/color-scheme.js?v=${CACHEID}"></script>
    <style>
        .optionsForm { padding: 12px 16px; }
        .optionsForm label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.9em; }
        .optionsForm .field { margin-bottom: 10px; }
        .optionsForm input[type="number"] { width: 100px; padding: 4px; }
        .optionsForm .unit { font-size: 0.85em; margin-left: 4px; opacity: 0.7; }
        .optionsForm .checkboxField { display: flex; align-items: center; gap: 6px; }
        .optionsForm .checkboxField label { display: inline; margin-bottom: 0; font-weight: normal; }
        .optionsForm .buttons { margin-top: 14px; text-align: right; }
        .optionsForm .buttons input { margin-left: 6px; }
        .optionsForm .error { color: var(--color-red, #f38ba8); font-size: 0.85em; display: none; margin-top: 4px; }
    </style>
</head>

<body>
    <div class="optionsForm">
        <div class="field">
            <label for="dlLimitInput">QBT_TR(Download limit:)QBT_TR[CONTEXT=PropertiesWidget]</label>
            <input type="number" id="dlLimitInput" min="0" step="1" placeholder="∞">
            <span class="unit">QBT_TR(KiB/s)QBT_TR[CONTEXT=SpeedLimitDialog]</span>
        </div>
        <div class="field">
            <label for="upLimitInput">QBT_TR(Upload limit:)QBT_TR[CONTEXT=PropertiesWidget]</label>
            <input type="number" id="upLimitInput" min="0" step="1" placeholder="∞">
            <span class="unit">QBT_TR(KiB/s)QBT_TR[CONTEXT=SpeedLimitDialog]</span>
        </div>
        <div class="field checkboxField">
            <input type="checkbox" id="seqDlCheck">
            <label for="seqDlCheck">QBT_TR(Download in sequential order)QBT_TR[CONTEXT=TransferListWidget]</label>
        </div>
        <div class="field checkboxField">
            <input type="checkbox" id="flPieceCheck">
            <label for="flPieceCheck">QBT_TR(Download first and last pieces first)QBT_TR[CONTEXT=TransferListWidget]</label>
        </div>
        <div class="field checkboxField">
            <input type="checkbox" id="autoTmmCheck">
            <label for="autoTmmCheck">QBT_TR(Automatic Torrent Management)QBT_TR[CONTEXT=TransferListWidget]</label>
        </div>
        <div class="field checkboxField" id="superSeedField" style="display: none;">
            <input type="checkbox" id="superSeedCheck">
            <label for="superSeedCheck">QBT_TR(Super seeding mode)QBT_TR[CONTEXT=TransferListWidget]</label>
        </div>
        <div class="error" id="errorMsg"></div>
        <div class="buttons">
            <input type="button" id="cancelButton" value="QBT_TR(Cancel)QBT_TR[CONTEXT=MainWindow]">
            <input type="button" id="applyButton" value="QBT_TR(Apply)QBT_TR[CONTEXT=HttpServer]">
        </div>
    </div>

    <script>
        "use strict";

        const hashParam = new URLSearchParams(window.location.search).get("hashes");
        if (!hashParam) {
            $("applyButton").disabled = true;
            $("errorMsg").textContent = "No torrents specified.";
            $("errorMsg").style.display = "block";
        }
        const hashes = hashParam ? hashParam.split("|").filter(Boolean) : [];

        const showError = (msg) => {
            const el = $("errorMsg");
            el.textContent = msg;
            el.style.display = "block";
        };

        const initialSeqDl = new Map();
        const initialFlPiece = new Map();
        let loaded = false;

        const loadOptions = async () => {
            if (hashes.length === 0)
                return;

            try {
                const resp = await fetch("api/v2/torrents/info?" + new URLSearchParams({ hashes: hashes.join("|") }));
                if (!resp.ok) {
                    showError("Failed to load torrent options.");
                    $("applyButton").disabled = true;
                    return;
                }
                const torrents = await resp.json();
                if (torrents.length === 0) {
                    showError("No matching torrents found.");
                    $("applyButton").disabled = true;
                    return;
                }

                const first = torrents[0];
                const allSame = (key) => torrents.every((t) => t[key] === first[key]);
                const allCompleted = torrents.every((t) => t.progress >= 1);

                if (allSame("dl_limit")) {
                    const limit = first.dl_limit;
                    $("dlLimitInput").value = (limit > 0) ? Math.floor(limit / 1024) : "";
                }

                if (allSame("up_limit")) {
                    const limit = first.up_limit;
                    $("upLimitInput").value = (limit > 0) ? Math.floor(limit / 1024) : "";
                }

                for (const t of torrents)
                    initialSeqDl.set(t.hash, t.seq_dl);

                if (allSame("seq_dl"))
                    $("seqDlCheck").checked = first.seq_dl;
                else
                    $("seqDlCheck").indeterminate = true;

                for (const t of torrents)
                    initialFlPiece.set(t.hash, t.f_l_piece_prio);

                if (allSame("f_l_piece_prio"))
                    $("flPieceCheck").checked = first.f_l_piece_prio;
                else
                    $("flPieceCheck").indeterminate = true;

                if (allSame("auto_tmm"))
                    $("autoTmmCheck").checked = first.auto_tmm;
                else
                    $("autoTmmCheck").indeterminate = true;

                if (allCompleted) {
                    $("superSeedField").style.display = "flex";
                    if (allSame("super_seeding"))
                        $("superSeedCheck").checked = first.super_seeding;
                    else
                        $("superSeedCheck").indeterminate = true;
                }

                loaded = true;
            }
            catch (e) {
                showError(e.message);
                $("applyButton").disabled = true;
            }
        };

        const applyOptions = async () => {
            if (!loaded)
                return;

            $("applyButton").disabled = true;
            const hashStr = hashes.join("|");
            const requests = [];

            const dlVal = $("dlLimitInput").value;
            if (dlVal !== "") {
                const parsed = Number(dlVal);
                if (!Number.isFinite(parsed) || parsed < 0) {
                    showError("Invalid download limit value.");
                    $("applyButton").disabled = false;
                    return;
                }
                requests.push(fetch("api/v2/torrents/setDownloadLimit", {
                    method: "POST",
                    body: new URLSearchParams({ hashes: hashStr, limit: Math.round(parsed * 1024) })
                }));
            }

            const upVal = $("upLimitInput").value;
            if (upVal !== "") {
                const parsed = Number(upVal);
                if (!Number.isFinite(parsed) || parsed < 0) {
                    showError("Invalid upload limit value.");
                    $("applyButton").disabled = false;
                    return;
                }
                requests.push(fetch("api/v2/torrents/setUploadLimit", {
                    method: "POST",
                    body: new URLSearchParams({ hashes: hashStr, limit: Math.round(parsed * 1024) })
                }));
            }

            if (!$("seqDlCheck").indeterminate) {
                const desired = $("seqDlCheck").checked;
                const needToggle = hashes.filter((h) => initialSeqDl.get(h) !== desired);
                if (needToggle.length > 0) {
                    requests.push(fetch("api/v2/torrents/toggleSequentialDownload", {
                        method: "POST",
                        body: new URLSearchParams({ hashes: needToggle.join("|") })
                    }));
                }
            }

            if (!$("flPieceCheck").indeterminate) {
                const desired = $("flPieceCheck").checked;
                const needToggle = hashes.filter((h) => initialFlPiece.get(h) !== desired);
                if (needToggle.length > 0) {
                    requests.push(fetch("api/v2/torrents/toggleFirstLastPiecePrio", {
                        method: "POST",
                        body: new URLSearchParams({ hashes: needToggle.join("|") })
                    }));
                }
            }

            if (!$("autoTmmCheck").indeterminate) {
                requests.push(fetch("api/v2/torrents/setAutoManagement", {
                    method: "POST",
                    body: new URLSearchParams({ hashes: hashStr, enable: $("autoTmmCheck").checked })
                }));
            }

            if ($("superSeedField").style.display !== "none" && !$("superSeedCheck").indeterminate) {
                requests.push(fetch("api/v2/torrents/setSuperSeeding", {
                    method: "POST",
                    body: new URLSearchParams({ hashes: hashStr, value: $("superSeedCheck").checked })
                }));
            }

            try {
                const responses = await Promise.all(requests);
                const failed = responses.filter((r) => !r.ok);
                if (failed.length > 0) {
                    showError(failed.length + " operation(s) failed.");
                    $("applyButton").disabled = false;
                    return;
                }
                window.parent.qBittorrent.Client.closeFrameWindow(window);
            }
            catch (e) {
                showError(e.message);
                $("applyButton").disabled = false;
            }
        };

        window.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                $("applyButton").click();
            }
            else if (event.key === "Escape") {
                event.preventDefault();
                window.parent.qBittorrent.Client.closeFrameWindow(window);
            }
        });

        $("applyButton").addEventListener("click", applyOptions);
        $("cancelButton").addEventListener("click", () => {
            window.parent.qBittorrent.Client.closeFrameWindow(window);
        });

        loadOptions().then(() => {
            if (loaded)
                $("dlLimitInput").focus();
        });
    </script>
</body>

</html>
